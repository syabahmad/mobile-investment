# fly.toml - Mobile Investment API (Backend)
# fly deploy --config backend/fly.toml

app = "mobile-investment-api"

[build]

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
